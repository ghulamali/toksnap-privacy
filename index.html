<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { margin: 0; padding: 0; background: #000; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c" width="1024" height="500"></canvas>
<script>
var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');
var W = 1024, H = 500;

// Background
ctx.fillStyle = '#08080F';
ctx.fillRect(0, 0, W, H);

// Pink radial glow top center
var grd1 = ctx.createRadialGradient(512, 0, 0, 512, 0, 400);
grd1.addColorStop(0, 'rgba(233,30,140,0.45)');
grd1.addColorStop(1, 'rgba(233,30,140,0)');
ctx.fillStyle = grd1;
ctx.fillRect(0, 0, W, H);

// Cyan glow bottom right
var grd2 = ctx.createRadialGradient(900, 500, 0, 900, 500, 350);
grd2.addColorStop(0, 'rgba(0,255,209,0.15)');
grd2.addColorStop(1, 'rgba(0,255,209,0)');
ctx.fillStyle = grd2;
ctx.fillRect(0, 0, W, H);

// Decorative lines
ctx.strokeStyle = 'rgba(233,30,140,0.12)';
ctx.lineWidth = 1;
for (var i = 0; i < 8; i++) {
  ctx.beginPath();
  ctx.moveTo(0, i * 70);
  ctx.lineTo(W, i * 70 + 30);
  ctx.stroke();
}

// App icon background circle
ctx.fillStyle = '#E91E8C';
ctx.beginPath();
ctx.roundRect(60, 160, 140, 140, 28);
ctx.fill();

// TS text in icon
ctx.fillStyle = '#ffffff';
ctx.font = 'bold 62px Arial';
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
ctx.fillText('TS', 130, 230);

// Pink glow behind icon
ctx.shadowColor = '#E91E8C';
ctx.shadowBlur = 40;
ctx.fillStyle = 'rgba(233,30,140,0.3)';
ctx.beginPath();
ctx.roundRect(58, 158, 144, 144, 30);
ctx.fill();
ctx.shadowBlur = 0;

// App name TokSnap
ctx.font = 'bold 78px Arial';
ctx.textAlign = 'left';
ctx.textBaseline = 'middle';
ctx.fillStyle = '#ffffff';
ctx.fillText('Tok', 230, 195);

ctx.fillStyle = '#E91E8C';
ctx.fillText('Snap', 355, 195);

// Tagline
ctx.font = '28px Arial';
ctx.fillStyle = 'rgba(255,255,255,0.65)';
ctx.fillText('Download Videos Fast & Free', 230, 255);

// Divider line
ctx.strokeStyle = 'rgba(255,255,255,0.1)';
ctx.lineWidth = 1;
ctx.beginPath();
ctx.moveTo(230, 285);
ctx.lineTo(720, 285);
ctx.stroke();

// Feature badges
var badges = [
  { text: 'HD Quality', icon: 'HD' },
  { text: 'No Watermark', icon: 'NW' },
  { text: 'MP3 Audio', icon: 'MP3' }
];

var bx = 230;
badges.forEach(function(b) {
  // Badge background
  ctx.fillStyle = 'rgba(233,30,140,0.18)';
  ctx.strokeStyle = 'rgba(233,30,140,0.5)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.roundRect(bx, 310, 155, 52, 12);
  ctx.fill();
  ctx.stroke();

  // Badge text
  ctx.font = 'bold 18px Arial';
  ctx.fillStyle = '#ffffff';
  ctx.textAlign = 'center';
  ctx.fillText(b.text, bx + 77, 337);

  bx += 175;
});

// Right side phone mockup outline
ctx.strokeStyle = 'rgba(255,255,255,0.15)';
ctx.lineWidth = 2;
ctx.beginPath();
ctx.roundRect(750, 60, 210, 380, 24);
ctx.stroke();

// Phone screen
ctx.fillStyle = '#100F18';
ctx.beginPath();
ctx.roundRect(762, 80, 186, 340, 16);
ctx.fill();

// Pink download button inside phone
ctx.fillStyle = '#E91E8C';
ctx.beginPath();
ctx.roundRect(780, 240, 150, 44, 10);
ctx.fill();

ctx.font = 'bold 16px Arial';
ctx.fillStyle = '#ffffff';
ctx.textAlign = 'center';
ctx.fillText('Download', 855, 263);

// Small URL bar in phone
ctx.fillStyle = 'rgba(255,255,255,0.08)';
ctx.beginPath();
ctx.roundRect(780, 120, 150, 36, 8);
ctx.fill();

ctx.font = '11px Arial';
ctx.fillStyle = 'rgba(255,255,255,0.4)';
ctx.textAlign = 'left';
ctx.fillText('vt.tiktok.com/...', 793, 143);

// Video thumb in phone
ctx.fillStyle = 'rgba(233,30,140,0.2)';
ctx.beginPath();
ctx.roundRect(780, 170, 150, 58, 8);
ctx.fill();

ctx.font = '11px Arial';
ctx.fillStyle = 'rgba(255,255,255,0.6)';
ctx.textAlign = 'center';
ctx.fillText('Video ready', 855, 200);

// Phone notch
ctx.fillStyle = '#08080F';
ctx.beginPath();
ctx.roundRect(820, 80, 70, 14, 7);
ctx.fill();

// Bottom tagline
ctx.font = '20px Arial';
ctx.fillStyle = 'rgba(255,255,255,0.35)';
ctx.textAlign = 'left';
ctx.fillText('No account required  •  Works instantly  •  100% Free', 60, 455);
</script>
</body>
</html>
